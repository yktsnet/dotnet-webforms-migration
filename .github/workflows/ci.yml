name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-api:
    name: .NET Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kintai_user
          POSTGRES_PASSWORD: kintai_pass
          POSTGRES_DB: KINTAI
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/Api.Tests/AttendanceApi.Tests.csproj

      - name: Build
        run: dotnet build src/Api.Tests/AttendanceApi.Tests.csproj --no-restore

      - name: Init DB
        run: |
          PGPASSWORD=kintai_pass psql -h 127.0.0.1 -U kintai_user -d KINTAI \
            < infrastructure/db/init/01_schema.sql

      - name: Test
        run: dotnet test src/Api.Tests/AttendanceApi.Tests.csproj --no-build --verbosity normal

  build-web:
    name: React Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: src/Web/package-lock.json

      - name: Install
        run: npm ci
        working-directory: src/Web

      - name: Build
        run: npm run build
        working-directory: src/Web
